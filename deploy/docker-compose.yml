services:
  bgutil-provider:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    restart: unless-stopped
    init: true
    networks:
      - stonks_default

  musicplay:
    image: ytplayer-musicplay:latest
    container_name: musicplay
    restart: unless-stopped
    depends_on:
      - bgutil-provider
    env_file:
      - .env
    environment:
      - LOG_DIR=/app/logs
      - BGUTIL_POT_BASE_URL=http://bgutil-provider:4416
    volumes:
      - ./data:/app/data
    networks:
      - stonks_default
    expose:
      - "3001"

networks:
  stonks_default:
    external: true
