services:
  bgutil-provider:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    restart: unless-stopped
    init: true
    networks:
      - web

  cookie-manager:
    image: ghcr.io/voenniy/ytplayer-cookie-manager:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:9222:9223"
    volumes:
      - cookie-data:/data
    networks:
      - web

  musicplay:
    image: ytplayer-musicplay:latest
    container_name: musicplay
    restart: unless-stopped
    depends_on:
      - bgutil-provider
      - cookie-manager
    env_file: .env
    environment:
      - LOG_DIR=/app/logs
      - BGUTIL_POT_BASE_URL=http://bgutil-provider:4416
    ports:
      - "127.0.0.1:2999:3001"
    volumes:
      - db-data:/app/data
      - ./logs:/app/logs
      - cookie-data:/app/cookie-data
    networks:
      - web

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - web

volumes:
  db-data:
  caddy-data:
  caddy-config:
  cookie-data:

networks:
  web:
